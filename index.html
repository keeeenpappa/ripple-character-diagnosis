<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a8fd1">
  <title>リップルアイランド おすすめキャラ診断</title>

  <!-- OGP -->
  <meta property="og:title" content="リップルアイランド おすすめキャラ診断">
  <meta property="og:description" content="10問でわかる！あなたに合うキャラは誰？">
  <meta property="og:image" content="https://keeeenpappa.github.io/ripple-character-diagnosis/backgrounds/thumbnail.png">
  <meta property="og:url" content="https://keeeenpappa.github.io/ripple-character-diagnosis/">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="リップルアイランド おすすめキャラ診断">
  <meta name="twitter:description" content="10問でわかる！あなたに合うキャラは誰？">
  <meta name="twitter:image" content="https://keeeenpappa.github.io/ripple-character-diagnosis/backgrounds/thumbnail.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== タイトル画面 ===== -->
    <section id="screen-title" class="screen active">
      <div class="title-container">
        <h1 class="title-main">リップルアイランド</h1>
        <h2 class="title-sub">おすすめキャラ診断</h2>
        <p class="title-desc">10問に答えて、あなたにぴったりのキャラを見つけよう！</p>
        <button id="btn-start" class="btn btn-start">診断スタート</button>
      </div>
    </section>

    <!-- ===== 質問画面 ===== -->
    <section id="screen-quiz" class="screen">
      <div class="quiz-container">
        <div class="progress-area">
          <div class="progress-label">
            質問 <span id="q-current">1</span> / <span id="q-total">10</span>
          </div>
          <div class="progress-bar-wrap">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>

        <div class="question-box">
          <p id="question-text" class="question-text"></p>
        </div>

        <div id="choices-list" class="choices-list"></div>

        <div class="nav-buttons">
          <button id="btn-prev" class="btn btn-prev">← 前の質問へ</button>
          <button id="btn-next" class="btn btn-next">次の質問へ →</button>
        </div>

        <div class="restart-wrap">
          <button id="btn-restart-quiz" class="btn btn-restart">最初からやり直す</button>
        </div>
      </div>
    </section>

    <!-- ===== 診断中演出 ===== -->
    <section id="screen-loading" class="screen">
      <div class="loading-container">
        <div class="loading-ripple">
          <div></div><div></div><div></div>
        </div>
        <p class="loading-text">診断中…</p>
      </div>
    </section>

    <!-- ===== 結果画面 ===== -->
    <section id="screen-result" class="screen">
      <div id="result-container" class="result-container">
        <h2 class="result-title">あなたにおすすめのキャラは</h2>

        <div id="result-deco-top" class="result-deco result-deco-top"></div>

        <div id="result-character-wrap" class="result-character-wrap">
          <div id="result-character-img-area" class="result-character-img-area">
            <img id="result-character-img" class="result-character-img" src="" alt="">
            <div id="result-character-placeholder" class="result-character-placeholder">
              <span>画像<br>準備中</span>
            </div>
          </div>
          <h3 id="result-character-name" class="result-character-name"></h3>
          <p id="result-type-name" class="result-type-name"></p>
        </div>

        <div id="result-deco-mid" class="result-deco result-deco-mid"></div>

        <div class="result-detail-box">
          <div class="result-section">
            <h4 class="result-section-heading">■ 傾向</h4>
            <p id="result-tendency" class="result-section-text"></p>
          </div>
          <div class="result-section">
            <h4 class="result-section-heading">■ キャラとの相性</h4>
            <p id="result-affinity" class="result-section-text"></p>
          </div>
          <div class="result-section">
            <h4 class="result-section-heading">■ こんな人におすすめ</h4>
            <ul id="result-recommendations" class="result-recommendations"></ul>
          </div>
        </div>

        <div id="result-deco-bot" class="result-deco result-deco-bot"></div>

        <div class="result-buttons">
          <button id="btn-share" class="btn btn-share">Xでシェア</button>
          <button id="btn-retry" class="btn btn-retry">もう一度診断する</button>
        </div>

      </div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
